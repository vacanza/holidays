repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0
    hooks:
      - id: check-ast
      - id: check-builtin-literals
      - id: check-yaml
      - id: end-of-file-fixer
      - id: file-contents-sorter
        args:
          - --unique
        files: CONTRIBUTORS
      - id: mixed-line-ending
        args:
          - --fix=lf
        exclude: make.cmd
      - id: trailing-whitespace
        exclude: \.md$

  - repo: https://github.com/asottile/pyupgrade
    rev: 75992aaa40730136014f34227e0135f63fc951b4  # v3.21.2
    hooks:
      - id: pyupgrade
        args:
          - --keep-runtime-typing
          - --py310-plus

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: c59bba8fb259db0fec2bbb77ad8ba51ea7341b56  # v0.15.20
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: a4d5d37e66ebcd6b3705204a1d6dbb56dea66338  # v0.49.0
    hooks:
      - id: markdownlint
        args:
          - --fix
        files: \.md$

  - repo: https://github.com/lucas-c/pre-commit-hooks
    rev: ad1b27d73581aa16cca06fc4a0761fc563ffe8e8  # v1.5.6
    hooks:
      - id: insert-license
        name: check license headers
        files: \.(po|py)$
        args:
          - --license-filepath
          - docs/file_header.txt

  - repo: https://github.com/pycqa/isort
    rev: a333737ed43df02b18e6c95477ea1b285b3de15a  # 8.0.1
    hooks:
      - id: isort
        exclude: ^(docs)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-polib==1.2.0.20260518
          - types-python-dateutil==2.9.0.20260518

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: 0c8c15d8fe996493035be407c5cf4a288cf6bf8e  # v2.25.1
    hooks:
      - id: pyproject-fmt

  - repo: local
    hooks:
      - id: normalize-unicode
        name: normalize unicode punctuation
        entry: python scripts/normalize_text.py
        language: system
        types: [text]
        exclude: ^(CHANGES\.md|scripts/normalize_text\.py)$
      - id: tests
        always_run: true
        entry: make check
        language: system
        name: run `make check`
        pass_filenames: false
        stages:
          - pre-push
